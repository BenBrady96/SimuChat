# =============================================================================
# SimuChat — PostgreSQL Secret
# =============================================================================
# Stores database credentials as base64-encoded values.
# In production, use a secrets manager (e.g., GCP Secret Manager, Vault).
#
# To encode your own values:
#   echo -n "your-value" | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    app: simuchat
    component: database
type: Opaque
data:
  # Base64-encoded values (decode: echo "<value>" | base64 -d)
  POSTGRES_DB: c2ltdWNoYXQ=            # simuchat
  POSTGRES_USER: c2ltdWNoYXQ=          # simuchat
  POSTGRES_PASSWORD: Y2hhbmdlbWU=      # changeme
