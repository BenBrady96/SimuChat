# =============================================================================
# SimuChat Frontend — Nginx Configuration
# =============================================================================
# Handles:
# 1. SPA routing: All non-file paths fall back to index.html
# 2. API proxy: /api requests are forwarded to the backend service
# 3. Static asset caching for optimal performance
# 4. Security headers to mitigate common web vulnerabilities
# =============================================================================

# Hide Nginx version from response headers (prevents server fingerprinting)
server_tokens off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------
    # These headers protect against common client-side attacks including
    # clickjacking, XSS, MIME sniffing, and information leakage.

    # Prevent the page from being embedded in iframes (clickjacking)
    add_header X-Frame-Options "DENY" always;

    # Prevent browsers from MIME-sniffing away from declared content-type
    add_header X-Content-Type-Options "nosniff" always;

    # Legacy XSS filter — still useful for older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Control referrer information sent with requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy — restrict resource loading
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Restrict browser features the app doesn't need
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # -------------------------------------------------------------------
    # API Proxy
    # -------------------------------------------------------------------
    # Forward all /api requests to the backend service.
    # In Docker Compose: backend:8080
    # In Kubernetes: backend-service:8080
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings for AI responses (Gemini can take a few seconds)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # -------------------------------------------------------------------
    # SPA Fallback
    # -------------------------------------------------------------------
    # React Router handles client-side routing, so all paths that don't
    # match a static file should serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------
    # Static Asset Caching
    # -------------------------------------------------------------------
    # Vite generates hashed filenames, so we can cache aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for index.html (ensure fresh deploys are picked up)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;
}
