# =============================================================================
# SimuChat Backend — Test Configuration (HOCON)
# =============================================================================
# Uses an H2 in-memory database instead of PostgreSQL for fast, isolated tests.
# =============================================================================

ktor {
    deployment {
        port = 8080
    }
    application {
        modules = [ com.simuchat.ApplicationKt.module ]
    }
}

# H2 in-memory database for testing
database {
    driver = "org.h2.Driver"
    url = "jdbc:h2:mem:test;DB_CLOSE_DELAY=-1"
    user = "sa"
    password = ""
}

jwt {
    secret = "test-secret-key-for-unit-tests-only"
    issuer = "simuchat"
    audience = "simuchat-users"
    realm = "SimuChat API"
    expiration = 86400000
}

gemini {
    apiKey = "test-api-key"
    model = "gemini-2.5-flash-lite"
}
