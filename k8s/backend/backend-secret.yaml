# =============================================================================
# SimuChat — Backend Application Secret
# =============================================================================
# Stores sensitive configuration for the Kotlin API backend.
# In production, use a secrets manager (e.g., GCP Secret Manager, Vault).
#
# To encode your own values:
#   echo -n "your-value" | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  labels:
    app: simuchat
    component: backend
type: Opaque
data:
  # Database connection details
  DB_HOST: cG9zdGdyZXMtc2VydmljZQ==                                   # postgres-service
  DB_PORT: NTQzMg==                                                     # 5432
  DB_NAME: c2ltdWNoYXQ=                                                 # simuchat
  DB_USER: c2ltdWNoYXQ=                                                 # simuchat
  DB_PASSWORD: Y2hhbmdlbWU=                                             # changeme

  # Google Gemini API key — replace with your actual key
  GEMINI_API_KEY: eW91ci1nZW1pbmktYXBpLWtleS1oZXJl                     # your-gemini-api-key-here

  # JWT signing secret — use a strong random string in production
  JWT_SECRET: c3VwZXItc2VjcmV0LWp3dC1rZXktY2hhbmdlLWluLXByb2R1Y3Rpb24= # super-secret-jwt-key-change-in-production
