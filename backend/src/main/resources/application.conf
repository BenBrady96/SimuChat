# =============================================================================
# SimuChat Backend — Ktor Application Configuration (HOCON)
# =============================================================================
# Environment variables are injected via Docker Compose or K8s secrets.
# Defaults are provided for local development.
# =============================================================================

ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.simuchat.ApplicationKt.module ]
    }
}

# Database connection settings
database {
    host = "localhost"
    host = ${?DB_HOST}
    port = "5432"
    port = ${?DB_PORT}
    name = "simuchat"
    name = ${?DB_NAME}
    user = "simuchat"
    user = ${?DB_USER}
    password = "changeme"
    password = ${?DB_PASSWORD}
}

# JWT authentication settings
jwt {
    secret = "super-secret-jwt-key-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "simuchat"
    audience = "simuchat-users"
    realm = "SimuChat API"
    expiration = 86400000  # 24 hours in milliseconds
}

# Google Gemini API settings
gemini {
    apiKey = ""
    apiKey = ${?GEMINI_API_KEY}
    model = "gemini-2.5-flash-lite"
}
