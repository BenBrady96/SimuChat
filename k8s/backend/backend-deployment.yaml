# =============================================================================
# SimuChat — Backend Deployment
# =============================================================================
# Deploys the Kotlin/Ktor REST API backend with 2 replicas for availability.
# Uses a rolling update strategy and health probes for zero-downtime deploys.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: simuchat
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simuchat
      component: backend

  # Rolling update ensures at least 1 pod is always available during deploys
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: simuchat
        component: backend
    spec:
      containers:
        - name: backend
          image: simuchat-backend:latest
          imagePullPolicy: IfNotPresent    # Use local images on K3s
          ports:
            - containerPort: 8080
              name: http

          # Inject secrets as environment variables
          envFrom:
            - secretRef:
                name: backend-secret

          # Health probes ensure Kubernetes only routes traffic to healthy pods
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5

          # Resource limits appropriate for e2-small (2 vCPU, 2GB RAM)
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
